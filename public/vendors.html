/* Modal */

.modal-overlay.show { display: flex; }

.form-group { display: flex; flex-direction: column; gap: 5px; }

.form-group label { font-size: 12px; color: #888; font-weight: 600; }
.form-group input, .form-group select, .form-group textarea {

.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #4a6fa5; }

.toast {

  background: #27ae60; color: #fff; padding: 12px 20px; border-radius: 8px;
  font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 9999; display: none;
}

</style>

<div class="main">

    <select class="filter-select" id="specialtyFilter" onchange="filterVendors()">

<!-- 忙聳掳氓垄聻/莽路篓猫录炉 Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="onOverlayClick(event)">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">忙聳掳氓垄聻氓禄聽氓聲聠</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>氓禄聽氓聲聠氓聬聧莽篓卤 *</label>
        <input type="text" id="fName" placeholder="盲戮聥茂录職氓聫掳氓聦聴忙聹篓盲陆聹莽虏戮氓路楼">

      <div class="form-group">

          <option>忙鲁楼盲陆聹茂录聫忙掳麓茅聸禄氓路楼莽篓聥</option>
          <option>忙聹篓盲陆聹氓路楼莽篓聥</option>
          <option>忙虏鹿忙录聠茂录聫氓隆聴猫拢聺氓路楼莽篓聥</option>
          <option>茅聬碌盲禄露氓路楼莽篓聥</option>
          <option>盲驴聺猫颅路氓路楼莽篓聥</option>
          <option>氓录卤茅聸禄氓路楼莽篓聥</option>
          <option>忙聶炉猫搂聙氓路楼莽篓聥</option>
          <option>莽聨禄莽聮聝氓路楼莽篓聥</option>
          <option>莽聡聢氓聟路氓路楼莽篓聥</option>
          <option>莽鲁禄莽碌卤忙芦聝氓路楼莽篓聥</option>

        <input type="text" id="fMobile" placeholder="忙聣聥忙漏聼猫聶聼莽垄录">

      <div class="form-group full">
        <label>Email</label>
        <input type="email" id="fEmail" placeholder="茅聸禄氓颅聬茅聝碌盲禄露">
      </div>
      <div class="form-group full">
        <label>氓聹掳氓聺聙</label>
        <input type="text" id="fAddress" placeholder="氓聟卢氓聫赂氓聹掳氓聺聙">
      </div>
      <div class="form-group full">
        <label>氓聜聶猫篓禄</label>
        <textarea id="fNotes" placeholder="氓聟露盲禄聳猫陋陋忙聵聨..."></textarea>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">氓聫聳忙露聢</button>
      <button class="btn-save" onclick="saveVendor()">氓聞虏氓颅聵</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allVendors = [];
let editingId = null;

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2800);
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/login.html';
}

async function init() {
  try {
    const me = await (await fetch('/api/me')).json();
    if (me.error) return location.href = '/login.html';
    document.getElementById('navUser').textContent = '冒聼聭陇 ' + me.displayName;
    if (me.role === 'admin') document.getElementById('adminLink').style.display = '';
  } catch { location.href = '/login.html'; }
  loadVendors();
}

async function loadVendors() {
  const res = await fetch('/api/vendors');
  allVendors = await res.json();
  filterVendors();
}

function filterVendors() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sp = document.getElementById('specialtyFilter').value;
  const filtered = allVendors.filter(v => {
    const matchQ = !q || v.name.toLowerCase().includes(q) ||
      (v.contact_person || '').toLowerCase().includes(q) ||
      (v.phone || '').includes(q) || (v.mobile || '').includes(q);
    const matchSp = !sp || v.specialty === sp;
    return matchQ && matchSp;
  });
  renderVendors(filtered);
}

function renderVendors(vendors) {
  document.getElementById('vendorCount').textContent = `茂录聢氓聟卤 ${vendors.length} 莽颅聠茂录聣`;
  const grid = document.getElementById('vendorGrid');
  const empty = document.getElementById('emptyState');
  if (vendors.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = vendors.map(v => `
    <div class="vendor-card">
      <div class="card-header">
        <div>
          <span class="card-name">${esc(v.name)}</span>
          ${v.specialty ? `<span class="card-tag">${esc(v.specialty)}</span>` : ''}
        </div>
      </div>
      <div class="card-info">
        ${v.contact_person ? `<div class="row"><span class="label">猫聛炉莽碌隆盲潞潞</span><span>${esc(v.contact_person)}</span></div>` : ''}
        ${v.phone ? `<div class="row"><span class="label">茅聸禄猫漏卤</span><span>${esc(v.phone)}</span></div>` : ''}
        ${v.mobile ? `<div class="row"><span class="label">忙聣聥忙漏聼</span><span>${esc(v.mobile)}</span></div>` : ''}
        ${v.email ? `<div class="row"><span class="label">Email</span><span>${esc(v.email)}</span></div>` : ''}
        ${v.address ? `<div class="row"><span class="label">氓聹掳氓聺聙</span><span>${esc(v.address)}</span></div>` : ''}
        ${v.notes ? `<div class="row" style="margin-top:6px;color:#888;font-size:12px;">${esc(v.notes)}</div>` : ''}
      </div>
      <div class="card-actions">
        <button class="act-btn edit" onclick="openModal(${v.id})">芒聹聫 莽路篓猫录炉</button>
        <button class="act-btn del" onclick="deleteVendor(${v.id}, '${esc(v.name)}')">氓聢陋茅聶陇</button>
      </div>
    </div>
  `).join('');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function openModal(id = null) {
  editingId = id;
  document.getElementById('modalTitle').textContent = id ? '莽路篓猫录炉氓禄聽氓聲聠' : '忙聳掳氓垄聻氓禄聽氓聲聠';
  const fields = ['fName','fContact','fSpecialty','fPhone','fMobile','fEmail','fAddress','fNotes'];
  fields.forEach(f => document.getElementById(f).value = '');

  if (id) {
    const v = allVendors.find(x => x.id === id);
    if (v) {
      document.getElementById('fName').value = v.name || '';
      document.getElementById('fContact').value = v.contact_person || '';
      document.getElementById('fSpecialty').value =(v.specialty || '');
      document.getElementById('fPhone').value = v.phone || '';
      document.getElementById('fMobile').value = v.mobile || '';
      document.getElementById('fEmail').value = v.email || '';
      document.getElementById('fAddress').value = v.address || '';
      document.getElementById('fNotes').value = v.notes || '';
    }
  }
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('fName').focus();
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function onOverlayClick(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

async function saveVendor() {
  const payload = {
    name: document.getElementById('fName').value.trim(),
    contact_person: document.getElementById('fContact').value.trim(),
    specialty: document.getElementById('fSpecialty').value,
    phone: document.getElementById('fPhone').value.trim(),
    mobile: document.getElementById('fMobile').value.trim(),
    email: document.getElementById('fEmail').value.trim(),
    address: document.getElementById('fAddress').value.trim(),
    notes: document.getElementById('fNotes').value.trim(),
  };
  if (!payload.name) { showToast('猫芦聥氓隆芦氓炉芦氓禄聽氓聲聠氓聬聧莽篓卤', true); return; }

  const method = editingId ? 'PUT' : 'POST';
  const url = editingId ? `/api/vendors/${editingId}` : '/api/vendors';
  const res = await fetch(url, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (data.success) {
    showToast(editingId ? '芒聹聟 氓禄聽氓聲聠猫鲁聡忙聳聶氓路職忙聸麓忙聳掳' : '芒聹聟 氓禄聽氓聲聠氓路職忙聳掳氓垄聻.);
    closeModal();
    loadVendors();
  } else {
    showToast('氓聞虏氓颅聵氓陇卤忙聲聴茂录職' + (data.error || ''), true);
  }
}

async function deleteVendor(id, name) {
  if (!confirm(`莽垄潞氓庐職猫娄聣`氓聢陋茅聶陇氓禄聽氓聲聠茫聙聦${name}茫聙聧氓聴聨茂录聼`)) return;
  const res = await fetch(`/api/vendors/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (data.success) {
    showToast('氓路虏氓聢陋茅聶陇氓禄聽氓聲聠');
    loadVendors();
  }
}

init();
</script>
</body>
</html>

/* Form */

.form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; font-weight: 600; }

}

.btn-add { margin-top: 16px; padding: 10px 24px; background: linear-gradient(135deg,#2c3e50,#4a6fa5); color: #fff; border: none; border-radius: 7px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-add:hover { opacity: 0.88; }
.error-msg { background:#fff0f0; border:1px solid #fcc; color:#c0392b; border-radius:6px; padding:8px 12px; font-size:13px; margin-top:10px; display:none; }
.success-msg { background:#f0fff4; border:1px solid #b2dfdb; color:#27ae60; border-radius:6px; padding:8px 12px; font-size:13px; margin-top:10px; display:none; }

/* Table */
table { width: 100%; border-collapse: collapse; }
thead tr { background: #f7f8fc; }
thead th { padding: 11px 14px; font-size: 12px; color: #7b8fa6; text-align: left; font-weight: 600; border-bottom: 1.5px solid #e8eaf0; }
tbody tr { border-bottom: 1px solid #f0f2f5; }
tbody tr:last-child { border-bottom: none; }
tbody td { padding: 12px 14px; font-size: 14px; }
.badge { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.badge-admin { background: #eef3ff; color: #4a6fa5; }
.badge-user { background: #f0fff4; color: #27ae60; }
.act-btn { padding: 4px 11px; border-radius: 5px; border: 1px solid #e0e4ee; background: #fff; cursor: pointer; font-size: 12px; font-family: inherit; margin-right: 4px; }
.act-btn.del { color: #e05050; border-color: #f5c0c0; }
.act-btn.del:hover { background: #fff0f0; }
.act-btn.pwd { color: #4a6fa5; border-color: #c0d0ef; }
.act-btn.pwd:hover { background: #eef3ff; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 200; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 12px; padding: 28px 32px; width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal input { width: 100%; border: 1.5px solid #e0e4ee; border-radius: 7px; padding: 9px 12px; font-size: 14px; font-family: inherit; outline: none; margin-bottom: 12px; }
.modal input:focus { border-color: #4a6fa5; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
.modal-btns button { padding: 9px 20px; border-radius: 6px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-cancel { background: #f0f2f5; color: #666; }
.btn-confirm { background: linear-gradient(135deg,#2c3e50,#4a6fa5); color: #fff; }
.modal-err { color: #c0392b; font-size: 13px; margin-bottom: 8px; display: none; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: #27ae60; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 9999; display: none; }
.toast.error { background: #c0392b; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand" onclick="location.href='/index.html'">氓陇搂盲潞聥猫篓颅猫篓聢忙聹聣茅聶聬氓聟卢氓聫赂</div>
  <div class="nav-right">

</nav>

<div class="main">

  <!-- 忙聳掳氓垄聻盲陆驴莽聰篓猫聙聟 -->

    <div class="card-header"><h2>芒聻聲 忙聳掳氓垄聻盲陆驴莽聰篓猫聙聟氓赂鲁猫聶聼</h2></div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-group">
          <label>氓赂鲁猫聶聼茂录聢莽聶禄氓聟楼莽聰篓茂录聣</label>
          <input type="text" id="newUsername" placeholder="盲戮聥茂录職designer01">
        </div>
        <div class="form-group">
          <label>茅隆炉莽陇潞氓搂聯氓聬聧</label>
          <input type="text" id="newDisplayName" placeholder="盲戮聥茂录職莽聨聥氓掳聫忙聵聨">
        </div>
        <div class="form-group">
          <label>氓炉聠莽垄录茂录聢猫聡鲁氓掳聭6氓聙聥氓颅聴氓聟聝茂录聣</label>
          <input type="password" id="newPassword" placeholder="猫芦聥猫录赂氓聟楼氓炉聠莽垄录">
        </div>
        <div class="form-group">
          <label>猫搂聮猫聣虏忙卢聤茅聶聬</label>
          <select id="newRole">
            <option value="user">盲赂聙猫聢卢盲陆驴莽聰篓猫聙聟茂录聢氓聫陋猫聝陆莽聹聥猫聡陋氓路卤莽職聞氓聽卤氓聝鹿氓聳庐茂录聣</option>
            <option value="admin">莽庐隆莽聬聠氓聯隆茂录聢氓聫炉莽聹聥忙聣聙忙聹聣盲潞潞莽職聞氓聽卤氓聝鹿氓聳庐茂录聣</option>
          </select>
        </div>
      </div>
      <div class="error-msg" id="addError"></div>

      <button class="btn-add" onclick="addUser()">忙聳掳氓垄聻氓赂鲁猫聶聼</button>

  </div>

  <!-- 盲陆驴莽聰篓猫聙聟氓聢聴猫隆篓 -->
  <div class="card">
    <div class="card-header"><h2>冒聼聭楼 盲陆驴莽聰篓猫聙聟氓聢聴猫隆篓</h2></div>
    <div class="card-body" style="padding:0;">
      <table>
        <thead><tr>
          <th>氓赂鲁猫聶聼</th><th>茅隆炉莽陇潞氓搂聯氓聬聧</th><th>猫搂聮猫聣虏</th><th>氓禄潞莽芦聥忙聶聜茅聳聯</th><th>忙聯聧盲陆聹</th>
        </tr></thead>
        <tbody id="userBody"><tr><td colspan="5" style="text-align:center;color:#aaa;padding:24px;">猫录聣氓聟楼盲赂颅...</td></tr></tbody>

    </div>
  </div>

</div>

<!-- 盲驴庐忙聰鹿氓炉聠莽垄录 Modal -->
<div class="modal-overlay" id="pwdModal">
  <div class="modal">
    <h3>冒聼聰聮 盲驴庐忙聰鹿氓炉聠莽垄录</h3>
    <p style="font-size:13px;color:#888;margin-bottom:14px;" id="pwdModalUser"></p>
    <input type="password" id="pwdInput" placeholder="猫录赂氓聟楼忙聳掳氓炉聠莽垄录茂录聢猫聡鲁氓掳聭6氓聙聥氓颅聴氓聟聝茂录聣">
    <input type="password" id="pwdConfirm" placeholder="氓聠聧忙卢隆莽垄潞猫陋聧忙聳掳氓炉聠莽垄录">
    <div class="modal-err" id="pwdErr"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closePwdModal()">氓聫聳忙露聢</button>
      <button class="btn-confirm" onclick="confirmChangePwd()">莽垄潞猫陋聧盲驴庐忙聰鹿</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let changePwdUserId = null;
let myId = null;

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2800);
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/login.html';
}

async function init() {
  const me = await (await fetch('/api/me')).json();
  if (me.error || me.role !== 'admin') return location.href = '/index.html';
  myId = me.id;
  loadUsers();
}

async function loadUsers() {
  const res = await fetch('/api/users');
  const users = await res.json();
  const tbody = document.getElementById('userBody');
  tbody.innerHTML = users.map(u => `
    <tr>
      <td><strong>${u.username}</strong></td>
      <td>${u.display_name}</td>
      <td><span class="badge badge-${u.role}">${u.role === 'admin' ? '莽庐隆莽聬聠氓聯隆' : '盲赂聙猫聢卢盲陆驴莽聰篓猫聙聟'}</span></td>
      <td style="font-size:12px;color:#888;">${u.created_at?.substring(0,16) || '-'}</td>
      <td>
        <button class="act-btn pwd" onclick="openPwdModal(${u.id},'${u.display_name}')">忙聰鹿氓炉聠莽垄录</button>
        ${u.id !== myId ? `<button class="act-btn del" onclick="deleteUser(${u.id},'${u.display_name}')">氓聢陋茅聶陇</button>` : '<span style="font-size:12px;color:#ccc;">茂录聢莽聸庐氓聣聧莽聶禄氓聟楼盲赂颅茂录聣</span>'}
      </td>
    </tr>
  `).join('');
}

async function addUser() {
  const username = document.getElementById('newUsername').value.trim();
  const display_name = document.getElementById('newDisplayName').value.trim();
  const password = document.getElementById('newPassword').value;
  const role = document.getElementById('newRole').value;
  const errEl = document.getElementById('addError');
  const sucEl = document.getElementById('addSuccess');
  errEl.style.display = 'none'; sucEl.style.display = 'none';

  if (!username || !display_name || !password) {
    errEl.textContent = '猫芦聥氓隆芦氓炉芦忙聣聙忙聹聣忙卢聞盲陆聧'; errEl.style.display = 'block'; return;
  }

  const res = await fetch('/api/users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password, display_name, role })
  });
  const data = await res.json();
  if (data.success) {
    sucEl.textContent = `芒聹聟 氓路虏忙聢聬氓聤聼氓禄潞莽芦聥氓赂鲁猫聶聼茫聙聦${username}茫聙聧`;
    sucEl.style.display = 'block';
    document.getElementById('newUsername').value = '';
    document.getElementById('newDisplayName').value = '';
    document.getElementById('newPassword').value = '';
    loadUsers();
  } else {
    errEl.textContent = data.error || '忙聳掳氓垄聻氓陇卤忙聲聴'; errEl.style.display = 'block';
  }
}

async function deleteUser(id, name) {
  if (!confirm(`莽垄潞氓庐職猫娄聛氓聢陋茅聶陇盲陆驴莽聰篓猫聙聟茫聙聦${name}茫聙聧氓聴聨茂录聼氓聢陋茅聶陇氓戮聦氓聟露忙聣聙忙聹聣氓聽卤氓聝鹿氓聳庐猫鲁聡忙聳聶盲禄聧盲驴聺莽聲聶茂录聦盲陆聠莽聞隆忙鲁聲e聠聧莽聶禄氓聟楼茫聙聜`)) return;
  const res = await fetch('/api/users/' + id, { method: 'DELETE' });
  const data = await res.json();
  if (data.success) { showToast('氓路虏氓聢陋茅聶陇盲陆驴莽聰篓猫聙聟 ' + name); loadUsers(); }
  else showToast(data.error || '氓聢陋茅聶陇氓陇卤忙聲聴', true);
}

function openPwdModal(id, name) {
  changePwdUserId = id;
  document.getElementById('pwdModalUser').textContent = '盲陆驴莽聰篓猫聙聟茂录職' + name;
  document.getElementById('pwdInput').value = '';
  document.getElementById('pwdConfirm').value = '';
  document.getElementById('pwdErr').style.display = 'none';
  document.getElementById('pwdModal').classList.add('show');
}

function closePwdModal() {
  document.getElementById('pwdModal').classList.remove('show');
}

async function confirmChangePwd() {
  const pwd = document.getElementById('pwdInput').value;
  const confirm = document.getElementById('pwdConfirm').value;
  const errEl = document.getElementById('pwdErr');
  errEl.style.display = 'none';

  if (pwd.length < 6) { errEl.textContent = '氓炉聠莽垄录猫聡鲁氓掳聭茅聹聙猫娄聛6氓聙聥氓颅聴氓聟聝'; errEl.style.display = 'block'; return; }
  if (pwd !== confirm) { errEl.textContent = '氓聟漏忙卢隆氓炉聠莽垄录猫录赂氓聟楼盲赂聧盲赂聙猫聡麓'; errEl.style.display = 'block'; return; }

  const res = await fetch('/api/users/' + changePwdUserId + '/password', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pwd })
  });
  const data = await res.json();
  if (data.success) { closePwdModal(); showToast('氓炉聠莽垄录氓路虏忙聸麓忙聳掳'); }
  else { errEl.textContent = data.error || '忙聸麓忙聳掳氓陇卤忙聲聴'; errEl.style.display = 'block'; }
}

init();
</script>
</body>

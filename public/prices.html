<script>
const CAT_LABELS = {
  demolish: '忙聥聠茅聶陇氓路楼莽篓聥', masonry: '忙鲁楼盲陆聹茂录聫忙掳麓茅聸禄', woodwork: '忙聹篓盲陆聹氓路楼莽篓聥',
  paint: '忙虏鹿忙录聠氓隆聴猫拢聺', metal: '茅聬碌盲禄露氓路楼莽篓聥', protection: '盲驴聺猫颅路氓路楼莽篓聥',
  weakelec: '氓录卤茅聸禄氓路楼莽篓聥', landscape: '忙聶炉猫搂聙氓路楼莽篓聥', glass: '莽聨禄莽聮聝氓路楼莽篓聥',
  lighting: '莽聡聢氓聟路氓路楼莽篓聥', cabinet: '莽鲁禄莽碌卤忙芦聝', other: '氓聟露盲禄聳氓路楼莽篓聥'
};

let allPrices = [];
let editingId = null;

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2800);
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/login.html';
}

async function init() {
  try {
    const me = await (await fetch('/api/me')).json();
    if (me.error) return location.href = '/login.html';
    document.getElementById('navUser').textContent = '冒聼聭陇 ' + me.displayName;
    if (me.role === 'admin') document.getElementById('adminLink').style.display = '';
  } catch { location.href = '/login.html'; }
  loadPrices();
}

async function loadPrices() {
  const res = await fetch('/api/prices');
  allPrices = await res.json();
  filterPrices();
}

function filterPrices() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const filtered = allPrices.filter(p => {
    const matchQ = !q || p.item_name.toLowerCase().includes(q) ||
      (p.spec || '').toLowerCase().includes(q);
    const matchCat = !cat || p.category === cat;
    return matchQ && matchCat;
  });
  renderPrices(filtered);
}

function renderPrices(prices) {
  document.getElementById('priceCount').textContent = `茂录聢氓聟卤 ${prices.length} 莽颅聠茂录聣`;
  const tbody = document.getElementById('priceBody');
  const empty = document.getElementById('emptyState');
  const table = document.getElementById('priceTable');
  if (prices.length === 0) {
    table.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  table.style.display = 'table';
  empty.style.display = 'none';
  tbody.innerHTML = prices.map(p => `
    <tr>
      <td><span class="td-cat cat-${p.category}">${CAT_LABELS[p.category] || p.category}</span></td>
      <td class="td-item">${esc(p.item_name)}</td>
      <td style="color:#666;font-size:13px;">${esc(p.spec)}</td>
      <td style="text-align:center;color:#888;">${esc(p.unit)}</td>
      <td class="td-price">NT$ ${Math.round(p.unit_price).toLocaleString('zh-TW')}</td>
      <td style="color:#999;font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.notes||p.source)}</td>
      <td>
        <div class="td-actions">
          <button class="act-btn edit" onclick="openModal(${p.id})">莽路篓猫录炉</button>
          <button class="act-btn del" onclick="deletePrice(${p.id})">氓聢陋茅聶陇</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function openModal(id = null) {
  editingId = id;
  document.getElementById('modalTitle').textContent = id ? '莽路篓猫录炉氓聳庐氓聝鹿' : '忙聳掳氓垄聻氓聳庐氓聝鹿';
  ['fCategory','fItemName','fSpec','fUnit','fUnitPrice','fNotes']
    .forEach(f => document.getElementById(f).value = '');

  if (id) {
    const p = allPrices.find(x => x.id === id);
    if (p) {
      document.getElementById('fCategory').value = p.category || '';
      document.getElementById('fItemName').value = p.item_name || '';
      document.getElementById('fSpec').value = p.spec || '';
      document.getElementById('fUnit').value = p.unit || '';
      document.getElementById('fUnitPrice').value = p.unit_price || '';
      document.getElementById('fNotes').value = p.notes || p.source || '';
    }
  }
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function onOverlayClick(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

async function savePrice() {
  const payload = {
    category: document.getElementById('fCategory').value,
    item_name: document.getElementById('fItemName').value.trim(),
    spec: document.getElementById('fSpec').value.trim(),
    unit: document.getElementById('fUnit').value.trim() || '氓录聫',
    unit_price: parseFloat(document.getElementById('fUnitPrice').value) || 0,
    notes: document.getElementById('fNotes').value.trim(),
    source: document.getElementById('fNotes').value.trim(),
  };
  if (!payload.category) { showToast('猫芦聥茅聛赂忙聯聡氓路楼莽篓聥茅隆聻氓聢楼', true); return; }
  if (!payload.item_name) { showToast('猫芦聥氓隆芦氓炉芦氓聯聛茅聽聟氓聬聧莽篓卤', true); return; }

  const method = editingId ? 'PUT' : 'POST';
  const url = editingId ? `/api/prices/${editingId}` : '/api/prices';
  const res = await fetch(url, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (data.success) {
    showToast(editingId ? '芒聹聟 氓聳庐氓聝鹿氓路虏忙聸麓忙聳掳' : '芒聹聟 氓聳庐氓聝鹿氓路虏忙聳掳氓垄聻');
    closeModal();
    loadPrices();
  } else {
    showToast('氓聞虏氓颅聵氓陇卤忙聲聴茂录職' + (data.error || ''), true);
  }
}

async function deletePrice(id) {
  if (!confirm('莽垄潞氓庐職猫娄聛氓聢陋茅聶陇忙颅陇莽颅聠氓聳庐氓聝鹿猫鲁聡忙聳聶氓聴聨茂录聼')) return;
  const res = await fetch(`/api/prices/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (data.success) {
    showToast('氓路虏氓聢陋茅聶陇');
    loadPrices();
  }
}

init();
</script>
